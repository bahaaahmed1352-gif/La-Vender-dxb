<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Vender DXB — Exceptional Timepieces, Dubai</title>
  <meta name="description" content="Le Vender DXB is a luxury watch boutique in the heart of Dubai, curating exceptional timepieces for discerning collectors." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

  <!-- 🚀 IMPORT GOOGLE MODEL-VIEWER FOR BLAZING FAST 3D WITHOUT VPN -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════
       GLOBAL RESET & FOUNDATIONS
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --black:        #080808;
      --charcoal:     #111111;
      --gold:         #C9A96A;
      --gold-soft:    #DCC08B;
      --cream:        #F7F3EC;
      --glass-lo:     rgba(255,255,255,0.04);
      --glass-hi:     rgba(255,255,255,0.08);
      --gold-border:  rgba(201,169,106,0.15);
      --gold-glow:    rgba(201,169,106,0.08);
      --font-display: 'Cormorant Garamond', serif;
      --font-ui:      'Inter', sans-serif;
    }

    html {
      scroll-behavior: smooth;
      background: var(--black);
      color: var(--cream);
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-ui);
      background: var(--black);
      overflow-x: hidden;
      cursor: none;
    }

    /* ═══════════════════════════════════════════════════
       CUSTOM CURSOR
    ═══════════════════════════════════════════════════ */
    #cursor-dot {
      position: fixed;
      top: 0; left: 0;
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s;
    }

    #cursor-ring {
      position: fixed;
      top: 0; left: 0;
      width: 36px; height: 36px;
      border: 1px solid rgba(201,169,106,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, border-color 0.3s;
    }

    body:hover #cursor-dot { opacity: 1; }
    a:hover ~ #cursor-ring,
    button:hover ~ #cursor-ring {
      width: 56px; height: 56px;
      border-color: var(--gold);
    }

    /* ═══════════════════════════════════════════════════
       PRELOADER
    ═══════════════════════════════════════════════════ */
    #preloader {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 99000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #preloader-line {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 1px;
      background: var(--gold);
      opacity: 0;
    }

    #preloader-logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.95);
      overflow: hidden;
    }

    #preloader-logo {
      width: clamp(100px, 18vw, 200px);
      height: clamp(100px, 18vw, 200px);
      object-fit: contain;
      display: block;
      border-radius: 4px;
    }

    #preloader-sweep {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(201,169,106,0.35), transparent);
      transform: translateX(-100%);
      pointer-events: none;
    }

    #skip-btn {
      position: absolute;
      bottom: 2.5rem;
      right: 2.5rem;
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,169,106,0.55);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem 0;
      transition: color 0.3s;
    }
    #skip-btn:hover { color: var(--gold); }

    /* Tick heartbeat */
    @keyframes tick-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 0.9; transform: scale(1.08); }
    }

    #tick-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      margin: -2px;
      border-radius: 50%;
      background: var(--gold);
      animation: tick-pulse 0.5s steps(1) infinite;
      opacity: 0;
    }

    /* ═══════════════════════════════════════════════════
       NAVIGATION
    ═══════════════════════════════════════════════════ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 900;
      padding: 1.5rem 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(8,8,8,0.9), transparent);
      opacity: 0;
    }

    .nav-logo img {
      height: 40px;
      width: 40px;
      object-fit: contain;
      border-radius: 3px;
    }

    .nav-links {
      display: flex;
      gap: 3rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(247,243,236,0.6);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }

    .nav-tel {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--gold-soft);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-tel:hover { color: var(--gold); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
    }

    /* ═══════════════════════════════════════════════════
       HERO SECTION
    ═══════════════════════════════════════════════════ */
    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #hero-bg {
      position: absolute;
      inset: -30px;
      background-image: url('hero-la.jpg');
      background-size: cover;
      background-position: center;
      will-change: transform;
    }

    #hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(8,8,8,0.35) 0%, rgba(8,8,8,0.92) 100%);
      z-index: 1;
    }

    #particles-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    #hero-content {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 0 clamp(1.5rem, 5vw, 6rem);
      max-width: 1000px;
    }

    .hero-eyebrow {
      font-family: var(--font-ui);
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
      opacity: 0;
    }

    .hero-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 9rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 3rem;
      opacity: 0;
    }

    .hero-subtitles {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 3.5rem;
    }

    .hero-sub {
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--gold-soft);
      opacity: 0;
    }

    .hero-ctas {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-luxury {
      font-family: var(--font-ui);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--cream);
      background: transparent;
      border: 1px solid var(--gold);
      padding: 1rem 2.5rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transition: color 0.4s;
    }

    .btn-luxury::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(201,169,106,0.18), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .btn-luxury:hover::before { transform: translateX(100%); }
    .btn-luxury:hover { color: var(--gold); border-color: var(--gold-soft); }

    .btn-luxury.outline-ghost {
      border-color: rgba(201,169,106,0.4);
      color: rgba(247,243,236,0.7);
    }
    .btn-luxury.outline-ghost:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ═══════════════════════════════════════════════════
       SECTION SCAFFOLDING
    ═══════════════════════════════════════════════════ */
    .section-label {
      font-family: var(--font-ui);
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.8rem);
      letter-spacing: 0.06em;
      color: var(--cream);
      line-height: 1.1;
    }

    .gold-rule {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
      margin: 1.8rem 0;
    }

    /* ═══════════════════════════════════════════════════
       COLLECTION SECTION
    ═══════════════════════════════════════════════════ */
    #collection {
      padding: clamp(5rem, 10vw, 9rem) clamp(1.5rem, 5vw, 6rem);
      background: var(--black);
    }

    .collection-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 4rem;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .collection-header-right {
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(0.85rem, 1.4vw, 1rem);
      color: rgba(220,192,139,0.6);
      max-width: 300px;
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(1rem, 2vw, 1.8rem);
    }

    @media (max-width: 1024px) {
      .collection-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .collection-grid { grid-template-columns: 1fr; }
    }

    /* WATCH CARD */
    .watch-card {
      position: relative;
      background: rgba(17,17,17,0.7);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid var(--gold-border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transition: transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94),
                  border-color 0.4s ease,
                  box-shadow 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
      cursor: pointer;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
    }

    .watch-card:hover {
      transform: translateY(-8px);
      border-color: rgba(201,169,106,0.6);
      box-shadow: 0 30px 70px rgba(0,0,0,0.65), 0 0 40px rgba(201,169,106,0.07);
    }

    /* Radial spotlight glow on hover */
    .watch-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%),
        rgba(201,169,106,0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      z-index: 5;
    }
    .watch-card:hover::after { opacity: 1; }

    /* 3D Model Wrapper — 1:1 square */
    .card-iframe-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 100%;
      overflow: hidden;
      background: #0c0c0c;
    }

    /* Native Google Model Viewer Custom Styling */
    model-viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-color: #0c0c0c;
      --poster-color: transparent;
      --progress-bar-color: var(--gold);
    }

    .card-info {
      padding: 1.4rem 1.6rem 1.6rem;
      position: relative;
      z-index: 3;
    }

    .card-brand {
      font-family: var(--font-ui);
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .card-title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(1rem, 1.6vw, 1.25rem);
      letter-spacing: 0.05em;
      color: var(--cream);
      margin-bottom: 0.3rem;
    }

    .card-subtitle {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.82rem;
      color: rgba(220,192,139,0.5);
      letter-spacing: 0.04em;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(201,169,106,0.12);
    }

    .card-inquiry {
      font-family: var(--font-ui);
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(201,169,106,0.5);
      text-decoration: none;
      transition: color 0.3s;
    }
    .card-inquiry:hover { color: var(--gold); }

    .card-arrow {
      width: 24px;
      height: 1px;
      background: rgba(201,169,106,0.3);
      position: relative;
      transition: width 0.4s, background 0.4s;
    }
    .card-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 6px;
      height: 6px;
      border-top: 1px solid rgba(201,169,106,0.3);
      border-right: 1px solid rgba(201,169,106,0.3);
      transform: rotate(45deg);
      transition: border-color 0.4s;
    }
    .watch-card:hover .card-arrow { width: 36px; background: var(--gold); }
    .watch-card:hover .card-arrow::after { border-color: var(--gold); }

    /* ═══════════════════════════════════════════════════
       HERITAGE / ABOUT SECTION
    ═══════════════════════════════════════════════════ */
    #heritage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 80vh;
      overflow: hidden;
    }

    @media (max-width: 860px) {
      #heritage { grid-template-columns: 1fr; }
    }

    .heritage-image-col {
      position: relative;
      overflow: hidden;
      min-height: 60vmin;
    }

    #heritage-img-inner {
      position: absolute;
      inset: -10%;
      background-image: url('hero-la.jpg');
      background-size: cover;
      background-position: center;
      will-change: transform;
      transform: scale(1.1);
    }

    .heritage-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, rgba(8,8,8,0.9) 100%);
      z-index: 1;
    }

    /* Decorative corner marks */
    .heritage-image-col::before,
    .heritage-image-col::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      z-index: 2;
    }
    .heritage-image-col::before {
      top: 2rem; left: 2rem;
      border-top: 1px solid rgba(201,169,106,0.4);
      border-left: 1px solid rgba(201,169,106,0.4);
    }
    .heritage-image-col::after {
      bottom: 2rem; right: 2rem;
      border-bottom: 1px solid rgba(201,169,106,0.4);
      border-right: 1px solid rgba(201,169,106,0.4);
    }

    .heritage-text-col {
      background: var(--charcoal);
      display: flex;
      align-items: center;
      padding: clamp(3rem, 7vw, 7rem) clamp(2.5rem, 6vw, 6rem);
    }

    .heritage-text-inner { max-width: 520px; }

    .heritage-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: 0.05em;
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 2.5rem;
    }

    .heritage-body {
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(0.9rem, 1.4vw, 1.05rem);
      font-weight: 300;
      color: var(--gold-soft);
      line-height: 2;
      letter-spacing: 0.04em;
      margin-bottom: 1.4rem;
      opacity: 0.85;
    }

    .heritage-stat-row {
      display: flex;
      gap: 3rem;
      margin-top: 3rem;
      padding-top: 2.5rem;
      border-top: 1px solid rgba(201,169,106,0.15);
    }

    .heritage-stat-num {
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.5vw, 2.6rem);
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }

    .heritage-stat-label {
      font-family: var(--font-ui);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(247,243,236,0.4);
      margin-top: 0.4rem;
    }

    /* ═══════════════════════════════════════════════════
       LOCATION & HOURS SECTION
    ═══════════════════════════════════════════════════ */
    #location {
      padding: clamp(5rem, 10vw, 9rem) clamp(1.5rem, 5vw, 6rem);
      background: var(--black);
    }

    .location-header {
      text-align: center;
      margin-bottom: 5rem;
    }

    .location-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(2rem, 5vw, 5rem);
      align-items: start;
    }

    @media (max-width: 860px) {
      .location-grid { grid-template-columns: 1fr; }
    }

    /* Address card */
    .address-panel {
      background: rgba(17,17,17,0.6);
      border: 1px solid rgba(201,169,106,0.12);
      padding: clamp(2rem, 4vw, 3.5rem);
    }

    .address-label {
      font-family: var(--font-ui);
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .address-line {
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--cream);
      line-height: 1.8;
    }

    .address-tel {
      display: inline-block;
      margin-top: 1.5rem;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,169,106,0.3);
      padding-bottom: 0.15rem;
      transition: color 0.3s, border-color 0.3s;
    }
    .address-tel:hover { color: var(--gold-soft); border-color: var(--gold); }

    /* Luxury map placeholder */
    .map-container {
      margin-top: 2rem;
      height: 220px;
      background: #0d0d0d;
      border: 1px solid rgba(201,169,106,0.1);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-grid-h, .map-grid-v {
      position: absolute;
      background: rgba(201,169,106,0.05);
    }

    .map-road-h {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: rgba(201,169,106,0.1);
    }
    .map-road-v {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: rgba(201,169,106,0.1);
